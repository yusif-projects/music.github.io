name: Regenerate static SEO content

on:
  push:
    branches: [main]
    paths:
      - 'data/releases.json'
      - 'scripts/generate-seo.js'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate SEO content
        run: node scripts/generate-seo.js

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html lyrics/index.html
          git diff --staged --quiet || git commit -m "chore: regenerate static SEO from releases.json [skip ci]"
          git push
